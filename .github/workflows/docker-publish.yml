name: CI - Test, Build, Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  DOCKERHUB_USERNAME: nghialt411
  IMAGE_NAME: urbannoodle

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore UrbanNoodle.sln

      - name: Build solution
        run: dotnet build UrbanNoodle.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test UrbanNoodleTest/UrbanNoodleTest.csproj --no-build --verbosity normal

  docker:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          file: ./UrbanNoodle/Dockerfile
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
